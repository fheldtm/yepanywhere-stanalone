<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content, viewport-fit=cover" />
    <title>Yep Anywhere</title>
    <link rel="icon" href="/favicon.ico" sizes="48x48" />
    <link rel="icon" href="/icon-192.png" type="image/png" sizes="192x192" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#fbf8ff" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#181818" media="(prefers-color-scheme: dark)" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Yep Anywhere" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <style>
      /* Critical CSS to prevent flash of white background - only html, body/root handled by main CSS */
      html { background-color: #181818; }
      html[data-theme="light"], html[data-theme="custom"] { background-color: #fbf8ff; }
      html[data-theme="dark"] { background-color: #2f2f2f; }
      @media (prefers-color-scheme: light) {
        html:not([data-theme]) { background-color: #fbf8ff; }
      }
    </style>
    <script>
      // Apply theme before page renders to prevent flash
      (function() {
        var stored = localStorage.getItem('yep-anywhere-theme');
        var theme = stored || 'auto';
        if (theme === 'verydark') theme = 'dark';
        if (theme === 'custom') theme = 'light';
        if (theme !== 'auto' && theme !== 'light' && theme !== 'dark') theme = 'auto';
        document.documentElement.setAttribute('data-theme', theme);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
